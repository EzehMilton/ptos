server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:ptos
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

ptos:
  seed-data: true
  storage:
    local-dir: ./uploads
