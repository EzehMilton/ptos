<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Login</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card" style="max-width: 440px; margin: 60px auto;">
        <h2 class="card-title text-center">Log In</h2>

        <div th:if="${success}" class="flash flash-success" th:text="${success}"></div>
        <div th:if="${param.error}" class="flash flash-error">
            Invalid email or password.
        </div>
        <div th:if="${param.logout}" class="flash flash-success">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Email</label>
                <input type="email" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
        </form>

        <p class="text-center mt-2">
            <a th:href="@{/signup}">New client? Sign up here</a>
        </p>
    </div>
</div>
</body>
</html>
