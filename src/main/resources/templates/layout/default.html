<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - PTOS">SETLY</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">SETLY</a>
        <div class="navbar-menu">
        <ul class="navbar-nav">
            <!-- PT navigation -->
            <li sec:authorize="hasRole('PT')">
                <a th:href="@{/pt/dashboard}"
                   th:classappend="${currentPath == '/pt/dashboard'} ? 'nav-active'">Dashboard</a>
            </li>
            <li sec:authorize="hasRole('PT')">
                <a th:href="@{/pt/clients}"
                   th:classappend="${currentPath.startsWith('/pt/clients')} ? 'nav-active'">Clients</a>
            </li>
            <li sec:authorize="hasRole('PT')">
                <a th:href="@{/pt/workouts}"
                   th:classappend="${currentPath.startsWith('/pt/workouts')} ? 'nav-active'">Workouts</a>
            </li>
            <li sec:authorize="hasRole('PT')">
                <a th:href="@{/pt/checkins}"
                   th:classappend="${currentPath.startsWith('/pt/checkins')} ? 'nav-active'">
                    Check-ins
                    <span th:if="${ptPendingCheckInCount > 0}" class="nav-count" th:text="${ptPendingCheckInCount}"></span>
                </a>
            </li>
            <li sec:authorize="hasRole('PT')">
                <a th:href="@{/pt/messages}"
                   th:classappend="${currentPath.startsWith('/pt/messages')} ? 'nav-active'">
                    Messages
                    <span th:if="${unreadMessageCount > 0}" class="nav-count" th:text="${unreadMessageCount}"></span>
                </a>
            </li>
            <li sec:authorize="hasRole('PT')">
                <a th:href="@{/pt/business}"
                   th:classappend="${currentPath == '/pt/business'} ? 'nav-active'">Business</a>
            </li>
        </ul>

        <ul class="navbar-nav navbar-nav-actions">
            <li sec:authorize="hasRole('PT')">
                <a th:href="@{/pt/profile}"
                   th:classappend="${currentPath == '/pt/profile'} ? 'nav-active'"
                   class="nav-profile-link"
                   title="Edit profile"
                   aria-label="Edit profile">
                    <span class="profile-icon" aria-hidden="true">
                        <span class="profile-icon-head"></span>
                        <span class="profile-icon-body"></span>
                    </span>
                </a>
            </li>
            <!-- Authenticated: logout -->
            <li sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
                </form>
            </li>

            <!-- Not authenticated: login/signup -->
            <li sec:authorize="!isAuthenticated()"><a th:href="@{/login}">Login</a></li>
            <li sec:authorize="!isAuthenticated()"><a th:href="@{/pt/signup}">PT Sign Up</a></li>
        </ul>
        </div>
    </div>
</nav>

<div class="container main-content" layout:fragment="content">
</div>

<footer class="footer">
    <div class="container">
        SETLY MVP
    </div>
</footer>

</body>
</html>
