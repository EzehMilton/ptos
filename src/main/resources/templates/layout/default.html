<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - PTOS">SETLY</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">SETLY</a>
        <ul class="navbar-nav">
            <!-- PT navigation -->
            <li sec:authorize="hasRole('PT')">
                <a th:href="@{/pt/dashboard}"
                   th:classappend="${currentPath == '/pt/dashboard'} ? 'nav-active'">Dashboard</a>
            </li>
            <li sec:authorize="hasRole('PT')">
                <a th:href="@{/pt/clients}"
                   th:classappend="${currentPath.startsWith('/pt/clients')} ? 'nav-active'">Clients</a>
            </li>
            <li sec:authorize="hasRole('PT')">
                <a th:href="@{/pt/workouts}"
                   th:classappend="${currentPath.startsWith('/pt/workouts')} ? 'nav-active'">Workouts</a>
            </li>
            <li sec:authorize="hasRole('PT')">
                <a th:href="@{/pt/checkins}"
                   th:classappend="${currentPath.startsWith('/pt/checkins')} ? 'nav-active'">
                    Check-ins
                    <span th:if="${ptPendingCheckInCount > 0}" class="nav-count" th:text="${ptPendingCheckInCount}"></span>
                </a>
            </li>
            <li sec:authorize="hasRole('PT')">
                <a th:href="@{/pt/business}"
                   th:classappend="${currentPath == '/pt/business'} ? 'nav-active'">Business</a>
            </li>

            <!-- Client navigation -->
            <li sec:authorize="hasRole('CLIENT')">
                <a th:href="@{/client/home}"
                   th:classappend="${currentPath == '/client/home'} ? 'nav-active'">Home</a>
            </li>
            <li sec:authorize="hasRole('CLIENT')">
                <a th:href="@{/client/workouts}"
                   th:classappend="${currentPath.startsWith('/client/workouts')} ? 'nav-active'">My Workouts</a>
            </li>
            <li sec:authorize="hasRole('CLIENT')">
                <a th:href="@{/client/checkins}"
                   th:classappend="${currentPath.startsWith('/client/checkins')} ? 'nav-active'">My Check-ins</a>
            </li>
            <li sec:authorize="hasRole('CLIENT')">
                <a th:href="@{/client/profile}"
                   th:classappend="${currentPath == '/client/profile'} ? 'nav-active'">My Profile</a>
            </li>

            <!-- Authenticated: logout -->
            <li sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
                </form>
            </li>

            <!-- Not authenticated: login/signup -->
            <li sec:authorize="!isAuthenticated()"><a th:href="@{/login}">Login</a></li>
            <li sec:authorize="!isAuthenticated()"><a th:href="@{/signup}">Sign Up</a></li>
        </ul>
    </div>
</nav>

<div class="container main-content" layout:fragment="content">
</div>

<footer class="footer">
    <div class="container">
        SETLY MVP
    </div>
</footer>

</body>
</html>
