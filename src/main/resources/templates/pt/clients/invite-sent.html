<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Invitation Created</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1>Invitation Created</h1>
    </div>

    <div class="card">
        <p th:text="'Invitation sent to ' + ${invitation.fullName} + ' (' + ${invitation.email} + ')'"></p>

        <div class="form-group">
            <label for="inviteLink">Invite Link</label>
            <input type="text" id="inviteLink" th:value="${inviteLink}" readonly>
        </div>

        <p class="text-muted mb-3">Email delivery is not set up yet. Please share this link with your client manually.</p>

        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <button type="button" class="btn btn-primary" onclick="copyInviteLink()">Copy Link</button>
            <a th:href="@{/pt/clients/new}" class="btn btn-secondary">Invite Another Client</a>
            <a th:href="@{/pt/clients}" class="btn btn-secondary">Back to Clients</a>
        </div>
    </div>

    <script>
        function copyInviteLink() {
            const input = document.getElementById('inviteLink');
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(input.value);
        }
    </script>
</div>
</body>
</html>
