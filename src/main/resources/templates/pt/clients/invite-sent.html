<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Invitation Created</title>
</head>
<body>
<div layout:fragment="content">
    <div class="mb-2">
        <a th:href="@{/pt/clients/new}">&larr; Invite another client</a>
    </div>

    <div class="page-header">
        <h1>Invitation Created</h1>
    </div>

    <div class="card" style="max-width: 760px;">
        <p style="font-weight: 600;" th:text="|Invitation created for ${invitation.fullName} (${invitation.email})|"></p>
        <p class="text-muted mb-3">Email delivery is not set up yet. Copy this invite token and share it with your client manually. It stays valid for 7 days.</p>

        <div class="form-group">
            <label for="inviteToken">Invite Token</label>
            <input type="text" id="inviteToken" th:value="${inviteToken}" readonly>
        </div>

        <div class="form-group">
            <label for="inviteLink">Legacy Web Link</label>
            <input type="text" id="inviteLink" th:value="${inviteLink}" readonly>
            <small class="text-muted">This is only needed if you still want to use the browser-based invite page.</small>
        </div>

        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <button type="button" class="btn btn-primary" id="copyInviteToken">Copy Token</button>
            <a th:href="@{/pt/clients/new}" class="btn btn-secondary">Invite Another Client</a>
            <a th:href="@{/pt/clients}" class="btn btn-secondary">Back to Clients</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const button = document.getElementById("copyInviteToken");
            const input = document.getElementById("inviteToken");

            if (!button || !input) {
                return;
            }

            button.addEventListener("click", async function () {
                try {
                    await navigator.clipboard.writeText(input.value);
                    button.textContent = "Copied";
                } catch (error) {
                    input.select();
                    document.execCommand("copy");
                    button.textContent = "Copied";
                }
            });
        });
    </script>
</div>
</body>
</html>
