<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Client Check-ins</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1>Client Check-ins</h1>
    </div>

    <div th:if="${success}" class="flash flash-success" th:text="${success}"></div>
    <div th:if="${error}" class="flash flash-error" th:text="${error}"></div>

    <div class="filter-tabs mb-3">
        <a th:href="@{/pt/checkins(filter='pending')}"
           class="filter-tab"
           th:classappend="${selectedFilter == 'pending'} ? 'filter-tab-active'">
            Pending
            <span class="tab-count" th:text="${pendingCount}"></span>
        </a>
        <a th:href="@{/pt/checkins(filter='reviewed')}"
           class="filter-tab"
           th:classappend="${selectedFilter == 'reviewed'} ? 'filter-tab-active'">
            Reviewed
        </a>
        <a th:href="@{/pt/checkins(filter='all')}"
           class="filter-tab"
           th:classappend="${selectedFilter == 'all'} ? 'filter-tab-active'">
            All
        </a>
    </div>

    <div th:if="${checkIns.isEmpty()}" class="card text-center">
        <p class="text-muted"
           th:text="${selectedFilter == 'reviewed' ? 'No reviewed check-ins' : (selectedFilter == 'all' ? 'No check-ins yet' : 'No pending check-ins')}"></p>
    </div>

    <div th:if="${!checkIns.isEmpty()}" class="card">
        <table>
            <thead>
                <tr>
                    <th>Client</th>
                    <th>Date</th>
                    <th>Weight</th>
                    <th>Mood</th>
                    <th>Energy</th>
                    <th>Sleep</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="checkIn : ${checkIns}">
                    <td>
                        <a th:href="@{/pt/clients/{id}(id=${checkIn.clientRecord.id})}"
                           th:text="${checkIn.clientRecord.clientUser.fullName}"></a>
                    </td>
                    <td th:text="${#temporals.format(checkIn.submittedAt, 'dd MMM yyyy')}"></td>
                    <td th:text="${#numbers.formatDecimal(checkIn.currentWeightKg, 1, 1)} + ' kg'"></td>
                    <td th:text="${checkIn.moodScore != null ? checkIn.moodScore + '/5' : '—'}"></td>
                    <td th:text="${checkIn.energyScore != null ? checkIn.energyScore + '/5' : '—'}"></td>
                    <td th:text="${checkIn.sleepScore != null ? checkIn.sleepScore + '/5' : '—'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${checkIn.status.name() == 'PENDING_REVIEW'} ? 'badge-info' : 'badge-active'"
                              th:text="${checkIn.status.name() == 'PENDING_REVIEW' ? 'Awaiting Review' : 'Reviewed'}"></span>
                    </td>
                    <td><a th:href="@{/pt/checkins/{id}(id=${checkIn.id})}">Review</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
