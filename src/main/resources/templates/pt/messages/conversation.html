<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title th:text="${'Conversation with ' + otherPersonName}">Conversation</title>
</head>
<body>
<div layout:fragment="content">
    <div class="mb-2">
        <a th:href="@{/pt/messages}">&larr; Messages</a>
    </div>

    <div class="page-header">
        <h1 th:text="${'Conversation with ' + otherPersonName}"></h1>
    </div>

    <p class="mb-2" th:if="${clientRecordId != null}">
        <a th:href="@{/pt/clients/{id}(id=${clientRecordId})}"
           th:text="${'View ' + otherPersonName + ' profile →'}"></a>
    </p>

    <div class="conversation-thread mb-3">
        <div th:if="${messages.isEmpty()}" class="text-muted">No messages yet. Start the conversation below.</div>
        <div th:each="message : ${messages}"
             class="message-row"
             th:classappend="${message.senderRole.name() == 'PT'} ? 'message-row-outgoing' : 'message-row-incoming'">
            <div class="message-bubble"
                 th:classappend="${message.senderRole.name() == 'PT'} ? 'message-bubble-outgoing' : 'message-bubble-incoming'">
                <p style="white-space: pre-line;" th:text="${message.content}"></p>
                <p class="message-meta"
                   th:text="${#temporals.format(message.createdAt, 'dd MMM yyyy HH:mm') + ' • ' + (message.readAt != null ? 'Read' : 'Unread')}"></p>
            </div>
        </div>
    </div>

    <div class="card">
        <form th:action="@{/pt/messages/{id}(id=${conversation.id})}" th:object="${messageForm}" method="post">
            <div class="form-group">
                <label for="content">Message</label>
                <textarea id="content" th:field="*{content}" rows="4"></textarea>
                <div class="form-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
            </div>
            <button type="submit" class="btn btn-primary">Send</button>
        </form>
    </div>
</div>
</body>
</html>
