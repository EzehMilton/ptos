<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Business Overview</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1>Business Overview</h1>
    </div>

    <!-- Row 1: KPI cards -->
    <div class="stat-grid mb-3">
        <div class="card stat-card">
            <div class="stat-value"
                 th:text="'£' + ${#numbers.formatDecimal(b.estimatedMonthlyRevenue, 1, 2)}"></div>
            <div class="stat-label">Monthly Revenue</div>
        </div>
        <div class="card stat-card">
            <div class="stat-value"
                 th:text="'£' + ${#numbers.formatDecimal(b.averageRevenuePerClient, 1, 2)} + '/mo'"></div>
            <div class="stat-label">Avg per Client</div>
        </div>
        <div class="card stat-card">
            <div class="stat-value" style="color: #16a34a;" th:text="${b.activeClientCount}"></div>
            <div class="stat-label">Active Clients</div>
        </div>
        <div class="card stat-card">
            <div class="stat-value"
                 th:style="${b.clientsNeedingAttention > 0} ? 'color: #d97706;' : ''"
                 th:text="${b.clientsNeedingAttention}"></div>
            <div class="stat-label">Needs Attention</div>
        </div>
    </div>

    <!-- Row 2: Client Overview table -->
    <div class="card mb-3">
        <h3 class="card-title">Client Overview</h3>
        <div th:if="${b.clientBreakdown.isEmpty()}">
            <p class="text-muted">No clients yet.</p>
        </div>
        <table th:if="${!b.clientBreakdown.isEmpty()}">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Package</th>
                    <th>Profile</th>
                    <th>Health</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${b.clientBreakdown}">
                    <td>
                        <a th:href="@{/pt/clients/{id}(id=${c.clientRecordId})}" th:text="${c.name}"></a>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${c.status.name() == 'ACTIVE'} ? 'badge-active' :
                                             (${c.status.name() == 'AT_RISK'} ? 'badge-warning' : 'badge-neutral')"
                              th:text="${c.status.name()}"></span>
                    </td>
                    <td>
                        <span th:if="${c.packagePrice != null}"
                              th:text="'£' + ${#numbers.formatDecimal(c.packagePrice, 1, 2)} + '/mo'"></span>
                        <span th:if="${c.packagePrice == null}" class="text-muted">&mdash;</span>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${c.profileCompletion >= 4} ? 'badge-active' : 'badge-warning'"
                              th:text="${c.profileCompletion} + '/6'"></span>
                    </td>
                    <td>
                        <span th:if="${c.healthLabel == 'Good'}" style="color: #16a34a; font-weight: 500;">Good</span>
                        <span th:if="${c.healthLabel == 'Needs Attention'}" style="color: #d97706; font-weight: 500;">Needs Attention</span>
                        <span th:if="${c.healthLabel == 'Inactive'}" class="text-muted">Inactive</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Row 3: Profile Completion Summary -->
    <div class="card">
        <h3 class="card-title">Profile Completion</h3>
        <p>
            <strong th:text="${b.completeProfileCount}"></strong> of
            <strong th:text="${b.totalClientCount}"></strong>
            clients have a mostly complete profile (4+ fields).
            <span th:if="${b.totalClientCount > 0}">
                (<span th:text="${b.profileCompletionRate}"></span>%)
            </span>
        </p>
        <div th:if="${!b.incompleteProfileClients.isEmpty()}" class="mt-2">
            <p style="color: #d97706; font-weight: 500;"
               th:text="${b.incompleteProfileClients.size()} + ' client(s) with incomplete profiles:'"></p>
            <ul style="margin-top: 8px; padding-left: 20px;">
                <li th:each="c : ${b.incompleteProfileClients}">
                    <a th:href="@{/pt/clients/{id}(id=${c.clientRecordId})}" th:text="${c.name}"></a>
                    <span class="text-muted" th:text="'(' + ${c.profileCompletion} + '/6)'"></span>
                </li>
            </ul>
        </div>
        <p th:if="${b.incompleteProfileClients.isEmpty()}" class="mt-1" style="color: #16a34a;">
            All clients have complete profiles.
        </p>
    </div>
</div>
</body>
</html>
