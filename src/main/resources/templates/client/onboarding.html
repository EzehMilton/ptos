<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Let's Get Started</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1>Let's Get Started</h1>
    </div>

    <div class="card" style="max-width: 860px;">
        <p th:if="${ptName != null}" class="text-muted mb-3">
            You're training with <span th:text="${ptName}"></span>. Let's set up your profile.
        </p>
        <p th:if="${ptName == null}" class="text-muted mb-3">Welcome to PTOS! Let's set up your profile.</p>

        <form th:action="@{/client/onboarding}" th:object="${onboardingForm}" method="post">
            <div class="card mb-3" style="background: #fafaf9;">
                <h3 class="card-title">About You</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px;">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" th:field="*{age}" min="16" max="100" step="1" required>
                        <div class="form-error" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
                    </div>
                    <div class="form-group">
                        <label for="heightCm">Height in cm</label>
                        <input type="number" id="heightCm" th:field="*{heightCm}" min="100" max="250" step="0.1" required>
                        <div class="form-error" th:if="${#fields.hasErrors('heightCm')}" th:errors="*{heightCm}"></div>
                    </div>
                    <div class="form-group">
                        <label for="currentWeightKg">Current Weight in kg</label>
                        <input type="number" id="currentWeightKg" th:field="*{currentWeightKg}" min="30" max="300" step="0.1" required>
                        <div class="form-error" th:if="${#fields.hasErrors('currentWeightKg')}" th:errors="*{currentWeightKg}"></div>
                    </div>
                    <div class="form-group">
                        <label for="trainingExperience">Training Experience</label>
                        <select id="trainingExperience" th:field="*{trainingExperience}" required>
                            <option value="">Select...</option>
                            <option value="BEGINNER">Beginner</option>
                            <option value="INTERMEDIATE">Intermediate</option>
                            <option value="ADVANCED">Advanced</option>
                        </select>
                        <div class="form-error" th:if="${#fields.hasErrors('trainingExperience')}" th:errors="*{trainingExperience}"></div>
                    </div>
                </div>
            </div>

            <div class="card mb-3" style="background: #fafaf9;">
                <h3 class="card-title">Your Goals</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px;">
                    <div class="form-group">
                        <label for="goalType">Goal</label>
                        <select id="goalType" th:field="*{goalType}" required onchange="toggleTargetWeight()">
                            <option value="">Select...</option>
                            <option value="WEIGHT_LOSS">Weight Loss</option>
                            <option value="MUSCLE_GAIN">Muscle Gain</option>
                            <option value="STRENGTH">Strength</option>
                            <option value="ENDURANCE">Endurance</option>
                            <option value="GENERAL_FITNESS">General Fitness</option>
                        </select>
                        <div class="form-error" th:if="${#fields.hasErrors('goalType')}" th:errors="*{goalType}"></div>
                    </div>
                    <div class="form-group" id="targetWeightGroup"
                         th:style="${onboardingForm.goalType != null and (onboardingForm.goalType.name() == 'WEIGHT_LOSS' or onboardingForm.goalType.name() == 'MUSCLE_GAIN')} ? '' : 'display: none;'">
                        <label for="targetWeightKg">Target Weight in kg</label>
                        <input type="number" id="targetWeightKg" th:field="*{targetWeightKg}" min="30" max="300" step="0.1">
                        <div class="form-error" th:if="${#fields.hasErrors('targetWeightKg')}" th:errors="*{targetWeightKg}"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="goalNotes">Goal Notes</label>
                    <textarea id="goalNotes" th:field="*{goalNotes}" rows="4"
                              placeholder="Any specific targets or timelines?"></textarea>
                    <div class="form-error" th:if="${#fields.hasErrors('goalNotes')}" th:errors="*{goalNotes}"></div>
                </div>
            </div>

            <div class="card mb-3" style="background: #fafaf9;">
                <h3 class="card-title">Health &amp; Preferences</h3>
                <div class="form-group">
                    <label for="injuriesOrConditions">Injuries or Conditions</label>
                    <textarea id="injuriesOrConditions" th:field="*{injuriesOrConditions}" rows="4"
                              placeholder="Any injuries, medical conditions, or mobility limitations?"></textarea>
                    <div class="form-error" th:if="${#fields.hasErrors('injuriesOrConditions')}" th:errors="*{injuriesOrConditions}"></div>
                </div>
                <div class="form-group">
                    <label for="dietaryPreferences">Dietary Preferences</label>
                    <textarea id="dietaryPreferences" th:field="*{dietaryPreferences}" rows="4"
                              placeholder="Allergies, vegetarian, etc."></textarea>
                    <div class="form-error" th:if="${#fields.hasErrors('dietaryPreferences')}" th:errors="*{dietaryPreferences}"></div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Complete Setup</button>
        </form>
    </div>

    <script>
        function toggleTargetWeight() {
            const goal = document.getElementById('goalType').value;
            const group = document.getElementById('targetWeightGroup');
            const show = goal === 'WEIGHT_LOSS' || goal === 'MUSCLE_GAIN';
            group.style.display = show ? '' : 'none';
        }
        toggleTargetWeight();
    </script>
</div>
</body>
</html>
