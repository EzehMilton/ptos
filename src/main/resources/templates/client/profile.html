<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>My Profile</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1>My Profile</h1>
    </div>

    <div th:if="${success}" class="flash flash-success" th:text="${success}"></div>

    <!-- Profile Summary -->
    <div th:if="${profile}" class="card mb-3">
        <h3 class="card-title">Profile Summary</h3>
        <p class="mb-2">
            <span class="badge" th:classappend="${completion == 6} ? 'badge-active' : 'badge-warning'"
                  th:text="'Profile: ' + ${completion} + '/6 complete'"></span>
        </p>
        <table>
            <tbody>
                <tr>
                    <td style="width:200px; font-weight:500;">Name</td>
                    <td th:text="${fullName}"></td>
                </tr>
                <tr>
                    <td style="font-weight:500;">Age</td>
                    <td th:text="${profile.age != null} ? ${profile.age} : '—'"></td>
                </tr>
                <tr>
                    <td style="font-weight:500;">Height</td>
                    <td th:text="${profile.heightCm != null} ? ${profile.heightCm} + ' cm' : '—'"></td>
                </tr>
                <tr>
                    <td style="font-weight:500;">Current Weight</td>
                    <td th:text="${profile.currentWeightKg != null} ? ${profile.currentWeightKg} + ' kg' : '—'"></td>
                </tr>
                <tr>
                    <td style="font-weight:500;">Goal</td>
                    <td th:text="${profile.goalType != null} ? ${profile.goalType.name()} : '—'"></td>
                </tr>
                <tr>
                    <td style="font-weight:500;">Target Weight</td>
                    <td th:text="${profile.targetWeightKg != null} ? ${profile.targetWeightKg} + ' kg' : '—'"></td>
                </tr>
                <tr>
                    <td style="font-weight:500;">Experience Level</td>
                    <td th:text="${profile.trainingExperience != null} ? ${profile.trainingExperience.name()} : '—'"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Edit Profile Form -->
    <div class="card">
        <h3 class="card-title">Edit Profile</h3>
        <p th:if="${onboardingComplete}" class="text-muted mb-2">Your profile is set up. You can update any details below.</p>

        <form th:action="@{/client/profile}" th:object="${profileForm}" method="post">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px;">
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" th:field="*{age}" min="16" max="100" step="1">
                    <div class="form-error" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
                </div>
                <div class="form-group">
                    <label for="heightCm">Height (cm)</label>
                    <input type="number" id="heightCm" th:field="*{heightCm}" min="100" max="250" step="0.1">
                    <div class="form-error" th:if="${#fields.hasErrors('heightCm')}" th:errors="*{heightCm}"></div>
                </div>
                <div class="form-group">
                    <label for="currentWeightKg">Current Weight (kg)</label>
                    <input type="number" id="currentWeightKg" th:field="*{currentWeightKg}" min="30" max="300" step="0.1">
                    <div class="form-error" th:if="${#fields.hasErrors('currentWeightKg')}" th:errors="*{currentWeightKg}"></div>
                </div>
                <div class="form-group">
                    <label for="targetWeightKg">Target Weight (kg)</label>
                    <input type="number" id="targetWeightKg" th:field="*{targetWeightKg}" min="30" max="300" step="0.1">
                    <div class="form-error" th:if="${#fields.hasErrors('targetWeightKg')}" th:errors="*{targetWeightKg}"></div>
                </div>
                <div class="form-group">
                    <label for="goalType">Goal</label>
                    <select id="goalType" th:field="*{goalType}">
                        <option value="">Select...</option>
                        <option th:each="g : ${T(com.ptos.domain.GoalType).values()}"
                                th:value="${g}" th:text="${g.name()}"></option>
                    </select>
                    <div class="form-error" th:if="${#fields.hasErrors('goalType')}" th:errors="*{goalType}"></div>
                </div>
                <div class="form-group">
                    <label for="trainingExperience">Experience Level</label>
                    <select id="trainingExperience" th:field="*{trainingExperience}">
                        <option value="">Select...</option>
                        <option th:each="t : ${T(com.ptos.domain.TrainingExperience).values()}"
                                th:value="${t}" th:text="${t.name()}"></option>
                    </select>
                    <div class="form-error" th:if="${#fields.hasErrors('trainingExperience')}" th:errors="*{trainingExperience}"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="injuriesOrConditions">Injuries or Conditions</label>
                <textarea id="injuriesOrConditions" th:field="*{injuriesOrConditions}" rows="3"></textarea>
                <div class="form-error" th:if="${#fields.hasErrors('injuriesOrConditions')}" th:errors="*{injuriesOrConditions}"></div>
            </div>
            <div class="form-group">
                <label for="dietaryPreferences">Dietary Preferences</label>
                <textarea id="dietaryPreferences" th:field="*{dietaryPreferences}" rows="3"></textarea>
                <div class="form-error" th:if="${#fields.hasErrors('dietaryPreferences')}" th:errors="*{dietaryPreferences}"></div>
            </div>
            <div class="form-group">
                <label for="notes">Notes</label>
                <textarea id="notes" th:field="*{notes}" rows="3"></textarea>
                <div class="form-error" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></div>
            </div>

            <button type="submit" class="btn btn-primary">Save Profile</button>
        </form>
    </div>
</div>
</body>
</html>
