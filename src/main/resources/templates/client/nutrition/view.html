<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>My Meal Plan</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1>My Meal Plan</h1>
    </div>

    <div th:if="${success}" class="flash flash-success" th:text="${success}"></div>
    <div th:if="${error}" class="flash flash-error" th:text="${error}"></div>

    <div th:if="${mealPlan == null}" class="card">
        <p class="text-muted">Your PT hasn't assigned a meal plan yet.</p>
    </div>

    <div th:if="${mealPlan != null}">
        <div class="card mb-3">
            <h3 class="card-title" th:text="${mealPlan.title}"></h3>
            <p th:if="${mealPlan.overview != null and !mealPlan.overview.isBlank()}"
               class="text-muted mb-2"
               th:text="${mealPlan.overview}"></p>
            <div style="white-space: pre-line;" th:text="${mealPlan.dailyGuidance}"></div>
        </div>

        <div class="card mb-3">
            <h3 class="card-title">Today's Compliance</h3>

            <div th:if="${todayLog != null}">
                <span class="badge"
                      th:classappend="${todayLog.compliance.name() == 'FOLLOWED'} ? 'badge-active' :
                                     (${todayLog.compliance.name() == 'PARTIALLY_FOLLOWED'} ? 'badge-warning' : 'badge-neutral')"
                      th:text="${todayLog.compliance.name().replace('_', ' ')}"></span>
                <p class="mt-2" th:if="${todayLog.notes != null and !todayLog.notes.isBlank()}" th:text="${todayLog.notes}"></p>
                <p class="text-muted mt-1" th:if="${todayLog.notes == null or todayLog.notes.isBlank()}">No notes added.</p>
            </div>

            <div th:if="${todayLog == null}">
                <form th:action="@{/client/nutrition/log}" method="post">
                    <div class="form-group">
                        <label for="notes">Notes (optional)</label>
                        <textarea id="notes" name="notes" rows="3"></textarea>
                    </div>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                        <button type="submit" name="compliance" value="FOLLOWED" class="btn btn-primary btn-sm">Followed</button>
                        <button type="submit" name="compliance" value="PARTIALLY_FOLLOWED" class="btn btn-secondary btn-sm">Partially Followed</button>
                        <button type="submit" name="compliance" value="NOT_FOLLOWED" class="btn btn-secondary btn-sm">Not Followed</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">Recent History</h3>

            <div th:if="${recentLogs.isEmpty()}">
                <p class="text-muted">No nutrition logs yet.</p>
            </div>

            <div th:if="${!recentLogs.isEmpty()}">
                <div th:each="log : ${recentLogs}" class="milestone-feed-row">
                    <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
                        <div>
                            <p style="font-weight: 600;" th:text="${#temporals.format(log.date, 'dd MMM yyyy')}"></p>
                            <p class="text-muted" th:if="${log.notes != null and !log.notes.isBlank()}" th:text="${log.notes}"></p>
                        </div>
                        <span class="badge"
                              th:classappend="${log.compliance.name() == 'FOLLOWED'} ? 'badge-active' :
                                             (${log.compliance.name() == 'PARTIALLY_FOLLOWED'} ? 'badge-warning' : 'badge-neutral')"
                              th:text="${log.compliance.name().replace('_', ' ')}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
