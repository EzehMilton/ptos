<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Client Home</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <h1 th:text="'Welcome, ' + ${fullName}"></h1>
    </div>

    <!-- No profile yet -->
    <div th:if="${!hasProfile}" class="card mb-3" style="text-align: center; padding: 40px;">
        <h3>Complete your profile to get started</h3>
        <p class="text-muted mb-2">Your trainer needs your details to build your program.</p>
        <a th:href="@{/client/profile}" class="btn btn-primary">Set Up Profile</a>
    </div>

    <!-- Has profile -->
    <div th:if="${hasProfile}" class="card mb-3">
        <h3 class="card-title">Your Profile</h3>
        <span class="badge" th:classappend="${completion == 6} ? 'badge-active' : 'badge-warning'"
              th:text="'Profile: ' + ${completion} + '/6 complete'"></span>
        <p class="mt-1"><a th:href="@{/client/profile}">Edit profile</a></p>
    </div>

    <!-- Placeholder cards -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div class="card">
            <h3 class="card-title">My Workouts</h3>
            <p class="text-muted">Coming soon</p>
        </div>
        <div class="card">
            <h3 class="card-title">My Check-ins</h3>
            <p class="text-muted">Coming soon</p>
        </div>
    </div>
</div>
</body>
</html>
