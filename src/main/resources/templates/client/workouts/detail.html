<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title th:text="${workout.name}">Workout Detail</title>
</head>
<body>
<div layout:fragment="content">
    <div class="mb-2">
        <a th:href="@{/client/workouts}">&larr; My Workouts</a>
    </div>

    <div class="page-header">
        <div>
            <h1 th:text="${workout.name}"></h1>
            <p class="text-muted"
               th:text="${workout.description != null and !workout.description.isBlank() ? workout.description : 'No description provided.'}"></p>
        </div>
        <span class="badge"
              th:classappend="${assignment.status.name() == 'ASSIGNED'} ? 'badge-info' :
                             (${assignment.status.name() == 'IN_PROGRESS'} ? 'badge-warning' : 'badge-active')"
              th:text="${assignment.status.name().replace('_', ' ')}"></span>
    </div>

    <div th:if="${success}" class="flash flash-success" th:text="${success}"></div>
    <div th:if="${error}" class="flash flash-error" th:text="${error}"></div>

    <div class="card mb-3">
        <h3 class="card-title">Workout Summary</h3>
        <table>
            <tbody>
                <tr>
                    <td style="width: 180px; font-weight: 500;">Category</td>
                    <td><span class="badge badge-neutral" th:text="${workout.category.name()}"></span></td>
                </tr>
                <tr>
                    <td style="font-weight: 500;">Assigned Date</td>
                    <td th:text="${#temporals.format(assignment.assignedDate, 'dd MMM yyyy')}"></td>
                </tr>
                <tr th:if="${assignment.startedAt != null}">
                    <td style="font-weight: 500;">Started</td>
                    <td th:text="${#temporals.format(assignment.startedAt, 'dd MMM yyyy HH:mm')}"></td>
                </tr>
                <tr th:if="${assignment.completedAt != null}">
                    <td style="font-weight: 500;">Completed</td>
                    <td th:text="${#temporals.format(assignment.completedAt, 'dd MMM yyyy HH:mm')}"></td>
                </tr>
                <tr th:if="${durationText != null}">
                    <td style="font-weight: 500;">Duration</td>
                    <td th:text="${durationText}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card mb-3">
        <h3 class="card-title">Exercises</h3>
        <table>
            <thead>
                <tr>
                    <th style="width: 40px;">#</th>
                    <th>Exercise</th>
                    <th>Sets</th>
                    <th>Reps</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="exercise, iter : ${workout.exercises}">
                    <td th:text="${iter.count}"></td>
                    <td th:text="${exercise.exerciseName}"></td>
                    <td th:text="${exercise.setsCount}"></td>
                    <td th:text="${exercise.repsText != null and !exercise.repsText.isBlank() ? exercise.repsText : '—'}"></td>
                    <td th:text="${exercise.notes != null and !exercise.notes.isBlank() ? exercise.notes : '—'}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card" th:if="${assignment.status.name() == 'ASSIGNED'}">
        <h3 class="card-title">Ready to Start</h3>
        <p class="text-muted mb-2">Start this workout when you are ready to begin.</p>
        <form th:action="@{/client/workouts/{id}/start(id=${assignment.id})}" method="post">
            <button type="submit" class="btn btn-primary">Start Workout</button>
        </form>
    </div>

    <div class="card" th:if="${assignment.status.name() == 'IN_PROGRESS'}">
        <h3 class="card-title">Complete Workout</h3>
        <p class="text-muted mb-2" th:if="${assignment.startedAt != null}"
           th:text="${'Started ' + #temporals.format(assignment.startedAt, 'dd MMM yyyy HH:mm')}"></p>
        <form th:action="@{/client/workouts/{id}/complete(id=${assignment.id})}" method="post">
            <div class="form-group">
                <label for="completionNotes">Completion Notes</label>
                <textarea id="completionNotes" name="completionNotes" rows="4"
                          placeholder="Optional notes about how the workout felt"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Complete Workout</button>
        </form>
    </div>

    <div class="card" th:if="${assignment.status.name() == 'COMPLETED'}">
        <h3 class="card-title">Workout Complete</h3>
        <table>
            <tbody>
                <tr th:if="${assignment.startedAt != null}">
                    <td style="width: 180px; font-weight: 500;">Started</td>
                    <td th:text="${#temporals.format(assignment.startedAt, 'dd MMM yyyy HH:mm')}"></td>
                </tr>
                <tr th:if="${assignment.completedAt != null}">
                    <td style="font-weight: 500;">Completed</td>
                    <td th:text="${#temporals.format(assignment.completedAt, 'dd MMM yyyy HH:mm')}"></td>
                </tr>
                <tr th:if="${durationText != null}">
                    <td style="font-weight: 500;">Duration</td>
                    <td th:text="${durationText}"></td>
                </tr>
                <tr>
                    <td style="font-weight: 500;">Completion Notes</td>
                    <td th:text="${assignment.completionNotes != null and !assignment.completionNotes.isBlank() ? assignment.completionNotes : '—'}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
